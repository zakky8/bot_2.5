name: Code Quality
on: [push, pull_request]

jobs:
  # ── Python: Project 1 — AI Support Bot ────────────────────────────────────
  syntax-project1:
    name: Project 1 — Support Bot (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-project1-${{ hashFiles('project1-support-bot/requirements.txt') }}
          restore-keys: pip-project1-

      - name: Install dependencies
        run: pip install -r project1-support-bot/requirements.txt

      - name: Syntax check
        run: |
          cd project1-support-bot
          python -m py_compile config.py rate_limiter.py ai_engine.py telegram_bot.py discord_bot.py main.py
          echo "Project 1: All files OK"

  # ── Node.js: Telegram Bot ──────────────────────────────────────────────────
  typecheck-telegram:
    name: Telegram Bot (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: telegram-bot/package-lock.json

      - name: Install dependencies
        run: cd telegram-bot && npm ci

      - name: Type check
        run: cd telegram-bot && npx tsc --noEmit

  # ── Node.js: Discord Bot ───────────────────────────────────────────────────
  typecheck-discord:
    name: Discord Bot (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: discord-bot/package-lock.json

      - name: Install dependencies
        run: cd discord-bot && npm ci

      - name: Type check
        run: cd discord-bot && npx tsc --noEmit
